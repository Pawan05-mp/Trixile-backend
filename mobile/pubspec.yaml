name: place_discovery_mobile
description: A high-performance Flutter application for Trixile with offline-first maps, geolocator and recommendations caching.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  supabase_flutter: ^2.9.1
  flutter_dotenv: ^5.2.1

  # Navigation & Routing
  go_router: ^14.6.3

  # State Management (Riverpod)
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Offline Storage (Hive CE & Secure Storage)
  hive_ce: ^2.13.0
  hive_ce_flutter: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # Maps & Geolocator
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.6

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/trixile_splash_dark.png
  android: true
  ios: true
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/trixile_icon.png"
  adaptive_icon_background: "assets/icons/adaptive-icon-light.png"
  adaptive_icon_foreground: "assets/icons/trixile_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/placeholders/
    - assets/places/

  fonts:
    - family: ClanPro
      fonts:
        - asset: assets/fonts/ClanPro/ClanPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/ClanPro/ClanPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/ClanPro/ClanPro-Bold.ttf
          weight: 700
